services:
  mongodb:
    image: mongo:7
    container_name: findnovel_mongodb
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: findnovel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
